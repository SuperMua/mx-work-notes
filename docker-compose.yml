services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - smart-notes-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d smart_notes']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  smart-notes-postgres-data:
